<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corporate Login | Imbeko Travel & Hospitality</title>
  <meta name="description" content="Access your Imbeko Travel corporate account. Manage bookings, view reports, and access exclusive corporate rates.">
  
  <!-- Favicon -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./style.css">
  <style>
    /* Additional login-specific styles */
    .login-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }

    .login-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="rgba(196,30,58,0.1)" stroke-width="0.5"/></svg>');
      background-size: 100px 100px;
      animation: backgroundMove 20s linear infinite;
    }

    @keyframes backgroundMove {
      from { transform: translate(0, 0); }
      to { transform: translate(100px, 100px); }
    }

    .login-container {
      width: 100%;
      max-width: 450px;
      position: relative;
      z-index: 1;
    }

    .login-card {
      background: white;
      border-radius: 16px;
      padding: 50px;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
      transform-style: preserve-3d;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .login-card:hover {
      transform: rotateX(2deg) rotateY(-2deg);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-logo img {
      height: 60px;
      margin-bottom: 10px;
    }

    .login-logo h2 {
      font-size: 32px;
      font-weight: 800;
      color: #1a1a1a;
    }

    .login-logo p {
      font-size: 14px;
      color: #666;
      margin-top: 5px;
    }

    .login-form .form-group {
      margin-bottom: 20px;
    }

    .login-form label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .login-form input {
      width: 100%;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .login-form input:focus {
      outline: none;
      border-color: #c41e3a;
      box-shadow: 0 0 0 3px rgba(196, 30, 58, 0.1);
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #666;
    }

    .remember-me input {
      width: 18px;
      height: 18px;
      accent-color: #c41e3a;
    }

    .forgot-password {
      font-size: 14px;
      color: #c41e3a;
    }

    .forgot-password:hover {
      text-decoration: underline;
    }

    .btn-full {
      width: 100%;
    }

    .login-divider {
      text-align: center;
      margin: 30px 0;
      position: relative;
    }

    .login-divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 1px;
      background: #ddd;
    }

    .login-divider span {
      position: relative;
      background: white;
      padding: 0 15px;
      font-size: 14px;
      color: #666;
    }

    .btn-outline {
      display: inline-block;
      width: 100%;
      padding: 15px;
      border: 2px solid #1a1a1a;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #1a1a1a;
      background: transparent;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }

    .btn-outline:hover {
      background: #1a1a1a;
      color: white;
    }

    .login-help {
      text-align: center;
      margin-top: 25px;
      padding-top: 25px;
      border-top: 1px solid #eee;
      font-size: 14px;
      color: #666;
    }

    .login-help a {
      color: #c41e3a;
      font-weight: 600;
    }

    .login-features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 30px;
      text-align: center;
    }

    .login-feature {
      color: #666;
    }

    .login-feature i {
      font-size: 24px;
      color: #c41e3a;
      margin-bottom: 10px;
    }

    .login-feature p {
      font-size: 12px;
    }

    .back-link {
      position: absolute;
      top: 30px;
      left: 30px;
      color: white;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 10;
    }

    .back-link:hover {
      color: #c9a227;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 30px;
      }

      .login-logo h2 {
        font-size: 24px;
      }

      .login-features {
        grid-template-columns: 1fr;
        gap: 15px;
      }
      
      .back-link {
        top: 15px;
        left: 15px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <section class="login-section">
    <a href="index.html" class="back-link">
      <i class="fas fa-arrow-left"></i> Back to Home
    </a>

    <div class="login-container">
      <div class="login-card">
        <div class="login-logo">
          <img src="images/logo.png" alt="Imbeko Travel & Hospitality">
          <p>Imbeko Travel Portal</p>
        </div>

        <form class="login-form" id="loginForm">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input 
              type="email" 
              id="email" 
              name="email" 
              required 
              placeholder="your@company.com"
              autocomplete="email"
            >
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input 
              type="password" 
              id="password" 
              name="password" 
              required 
              placeholder="Enter your password"
              autocomplete="current-password"
            >
          </div>

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" name="remember">
              <span>Remember me</span>
            </label>
            <a href="#" class="forgot-password">Forgot password?</a>
          </div>

          <button type="submit" class="btn-primary btn-full">
            <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i> Sign In
          </button>
        </form>

        <div class="login-divider">
          <span>OR</span>
        </div>

        <a href="contact.html" class="btn-outline">
          <i class="fas fa-building" style="margin-right: 8px;"></i> Request Account
        </a>

        <div class="login-help">
          <p>Need help? <a href="contact.html">Contact our support team</a></p>
        </div>

        <div class="login-features">
          <div class="login-feature">
            <i class="fas fa-chart-line"></i>
            <p>Travel Reports</p>
          </div>
          <div class="login-feature">
            <i class="fas fa-percentage"></i>
            <p>Corporate Rates</p>
          </div>
          <div class="login-feature">
            <i class="fas fa-headset"></i>
            <p>24/7 Support</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="./script.js"></script>
  <script>
    // Login form specific handling
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      // Show loading state
      const btn = this.querySelector('button[type="submit"]');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right: 8px;"></i> Signing in...';
      btn.disabled = true;
      
      // Simulate login (replace with actual authentication)
      setTimeout(() => {
        btn.innerHTML = originalText;
        btn.disabled = false;
        
        // Show success message
        const successMsg = document.createElement('div');
        successMsg.style.cssText = `
          background: #25d366;
          color: white;
          padding: 15px;
          border-radius: 6px;
          margin-bottom: 20px;
          text-align: center;
          font-size: 14px;
        `;
        successMsg.innerHTML = '<i class="fas fa-check-circle" style="margin-right: 8px;"></i> Login successful! Redirecting...';
        
        this.insertBefore(successMsg, this.firstChild);
        
        // Redirect after delay
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 2000);
      }, 1500);
    });
  </script>
</body>
</html>
